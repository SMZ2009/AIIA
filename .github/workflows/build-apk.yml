name: Build Android APK

# 从 PWA (https://hitszaiia.onrender.com) 构建 TWA APK
# 使用 Trusted Web Activity 技术将网页封装为 Android 应用

on:
  # 手动触发
  workflow_dispatch:
  # 推送时自动构建
  push:
    branches: [main]
    paths:
      - "public/manifest.json"
      - "android/**"
      - ".github/workflows/build-apk.yml"

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 下载并安装 Gradle
        run: |
          GRADLE_VERSION=8.5
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

      - name: 生成 Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.5

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=HITSZ AIIA, OU=AIIA, O=HITSZ, L=Shenzhen, ST=Guangdong, C=CN"

      - name: 构建 Debug APK
        run: cd android && ./gradlew assembleDebug
        env:
          KEYSTORE_FILE: debug.keystore
          KEYSTORE_PASSWORD: android
          KEYSTORE_ALIAS: android
          KEYSTORE_KEY_PASSWORD: android

      - name: 提取证书 SHA256 指纹
        run: |
          echo "::group::证书 SHA256 指纹"
          SHA256=$(keytool -list -v -keystore android/debug.keystore \
            -storepass android -alias android 2>/dev/null | \
            grep "SHA256:" | awk '{print $2}')
          echo "SHA256: $SHA256"
          echo "请将此指纹更新到 public/.well-known/assetlinks.json 的 sha256_cert_fingerprints 数组中"
          echo "::endgroup::"
          # 保存供后续步骤使用
          echo "CERT_SHA256=$SHA256" >> $GITHUB_ENV

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: HITSZ-AIIA-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
