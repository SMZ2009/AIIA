services:
  - type: web
    name: aiia
    env: node
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aiia-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: aiia-db
    plan: free
